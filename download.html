    // Platform detection
    function detectPlatform() {
      const ua = navigator.userAgent || '';
      const platform = navigator.platform || '';
      const uaData = navigator.userAgentData;
      if (/android/i.test(ua)) return 'android';
      if (/iPad|iPod/i.test(ua) || (navigator.maxTouchPoints > 1 && /Macintosh/i.test(ua))) return 'ios';
      if (/iPhone/i.test(ua)) return 'ios';
      if (uaData && uaData.platform) {
        if (/macOS/i.test(uaData.platform)) return 'macos';
        if (/Windows/i.test(uaData.platform)) return 'windows';
        if (/Linux/i.test(uaData.platform)) return 'linux';
      }
      if (/Macintosh|MacIntel|MacPPC|Mac68K/i.test(platform)) return 'macos';
      if (/Win/i.test(platform)) return 'windows';
      if (/Linux/i.test(platform) && !/android/i.test(ua)) return 'linux';
      return null;

    const platforms = [
      { id: 'android', name: 'Android', subtitle: 'Includes Wear OS', url: 'https://play.google.com/store/apps/details?id=com.haztech.launcher', btnLabel: 'Download' },
      { id: 'ios', name: 'iOS', subtitle: 'Includes iPadOS and Apple Watch', url: ghRelease, btnLabel: 'Download' },
      { id: 'macos', name: 'macOS', url: ghRelease, btnLabel: 'Download' },
      { id: 'windows', name: 'Windows', url: ghRelease, btnLabel: 'Download' },
      { id: 'linux', name: 'Linux', url: ghRelease, btnLabel: 'Download' }
    ];

    function createCard(p, isDetected) {
      const card = document.createElement('div');
      card.className = 'download-card' + (isDetected ? ' detected' : '');
      card.innerHTML =
        icons[p.id] +
        '<div class="detected-badge">Detected platform</div>' +
        '<h3>' + p.name + '</h3>' +
        (p.subtitle ? '<p class="download-subtitle">' + p.subtitle + '</p>' : '') +
        '<div class="download-actions">' +
          '<a href="' + p.url + '" class="download-btn" target="_blank" rel="noopener noreferrer">' + p.btnLabel + '</a>' +
          '<a href="' + ghRelease + '" class="download-link-secondary" target="_blank" rel="noopener noreferrer">Download from GitHub</a>' +
        '</div>';
      return card;
    }

    // Query param support: ?platform=android&redirect=auto
    const params = new URLSearchParams(window.location.search);
    const paramPlatform = params.get('platform');
    const autoRedirect = params.get('redirect') === 'auto';

    // Use query param platform if valid, otherwise auto-detect
    const detected = paramPlatform && platforms.find(p => p.id === paramPlatform)
      ? paramPlatform
      : detectPlatform();

    // Auto-redirect: go straight to the download URL
    if (autoRedirect && detected) {
      const target = platforms.find(p => p.id === detected);
      if (target) {
        window.location.href = target.url;
      }
    }

    const primaryEl = document.getElementById('downloadPrimary');
    const othersGrid = document.getElementById('downloadOthersGrid');
    const showAllBtn = document.getElementById('showAllBtn');
    const othersEl = document.getElementById('downloadOthers');

    // Build primary card (detected) and others
    const detectedPlatform = platforms.find(p => p.id === detected);
    const otherPlatforms = platforms.filter(p => p.id !== detected);

    if (detectedPlatform) {
      primaryEl.appendChild(createCard(detectedPlatform, true));
    } else {
      // No platform detected — show all directly
      platforms.forEach(p => primaryEl.appendChild(createCard(p, false)));
      showAllBtn.style.display = 'none';
      othersEl.style.display = 'none';
    }

    otherPlatforms.forEach(p => othersGrid.appendChild(createCard(p, false)));

    // Toggle show all
    showAllBtn.addEventListener('click', () => {
      const isOpen = othersEl.classList.toggle('open');
      showAllBtn.classList.toggle('expanded', isOpen);
      showAllBtn.querySelector('span').textContent = isOpen ? 'Hide other platforms' : 'Show all platforms';
    });
  </script>
